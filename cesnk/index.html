<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的网页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #fff;
            border-radius: 16px;
            padding: 48px;
            max-width: 560px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        h1 {
            font-size: 2.2em;
            color: #333;
            margin-bottom: 16px;
        }

        p {
            font-size: 1.1em;
            color: #666;
            line-height: 1.8;
            margin-bottom: 24px;
        }

        .btn {
            display: inline-block;
            padding: 14px 36px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 32px;
            flex-wrap: wrap;
        }

        .feature {
            flex: 1;
            min-width: 120px;
            padding: 16px;
            background: #f7f8ff;
            border-radius: 10px;
        }

        .feature h3 {
            font-size: 0.95em;
            color: #667eea;
            margin-bottom: 6px;
        }

        .feature span {
            font-size: 0.85em;
            color: #999;
        }

        footer {
            margin-top: 36px;
            font-size: 0.85em;
            color: #bbb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👋 你好，世界！</h1>
        <p>
            这是一个简洁美观的 HTML 示例页面，<br>
            包含响应式布局、渐变背景和交互动效。<br>
            你可以直接下载并在浏览器中打开查看效果。
        </p>
        <a href="#" class="btn" onclick="alert('按钮被点击了！🎉')">点击我试试</a>

        <div class="features">
            <div class="feature">
                <h3>📱 响应式</h3>
                <span>适配各种屏幕</span>
            </div>
            <div class="feature">
                <h3>🎨 现代设计</h3>
                <span>渐变 & 阴影</span>
            </div>
            <div class="feature">
                <h3>⚡ 轻量</h3>
                <span>纯 HTML/CSS</span>
            </div>
        </div>

        <footer>
            © 2026 示例网页 · 用 ❤️ 编写
        </footer>
    </div>
</body>
</html>
