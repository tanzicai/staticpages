<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习任务点设计平台 - 教师管控中心</title>
    <style>
        :root {
            --primary: #4a90d9;
            --primary-light: #6ba3e0;
            --primary-lighter: #e8f2fc;
            --primary-dark: #357abd;
            --primary-soft: #d0e4f7;
            --bg: #f4f8fc;
            --white: #ffffff;
            --text: #2c3e50;
            --text-light: #5a6c7d;
            --text-muted: #8a9bb0;
            --border: #d9e4f0;
            --border-light: #e8eff7;
            --shadow-sm: 0 1px 3px rgba(74, 144, 217, 0.06);
            --shadow: 0 4px 16px rgba(74, 144, 217, 0.08);
            --shadow-md: 0 8px 30px rgba(74, 144, 217, 0.12);
            --shadow-lg: 0 16px 40px rgba(74, 144, 217, 0.15);
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'Monaco', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ========== 顶部导航栏 ========== */
        .navbar {
            background: linear-gradient(135deg, #3b7dc4 0%, #4a90d9 30%, #5098e2 60%, #4a90d9 100%);
            color: #fff;
            padding: 0 32px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 20px rgba(58, 120, 195, 0.25);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        .navbar .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.3px;
        }
        .navbar .logo-icon {
            width: 38px;
            height: 38px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            backdrop-filter: blur(6px);
            border: 1.5px solid rgba(255, 255, 255, 0.3);
        }
        .navbar .nav-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .navbar .teacher-badge {
            background: rgba(255, 255, 255, 0.18);
            padding: 7px 16px;
            border-radius: 22px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 7px;
            backdrop-filter: blur(6px);
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
        }
        .navbar .teacher-badge:hover {
            background: rgba(255, 255, 255, 0.28);
            transform: translateY(-1px);
        }
        .avatar-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffd166, #ffb347);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            color: #7a5500;
        }

        /* ========== 主布局 ========== */
        .main-container {
            display: flex;
            gap: 20px;
            padding: 20px 28px;
            max-width: 1500px;
            margin: 0 auto;
            min-height: calc(100vh - 60px);
        }

        /* ========== 左侧面板 - 章节树 ========== */
        .sidebar {
            width: 300px;
            min-width: 300px;
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border-light);
            transition: var(--transition);
        }
        .sidebar-header {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--primary-lighter);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        }
        .sidebar-header h3 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sidebar-header h3 .icon {
            font-size: 1.2rem;
        }
        .btn-add-chapter {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            box-shadow: 0 2px 8px rgba(74, 144, 217, 0.3);
        }
        .btn-add-chapter:hover {
            background: var(--primary-dark);
            transform: scale(1.08);
            box-shadow: 0 4px 14px rgba(74, 144, 217, 0.4);
        }
        .chapter-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .chapter-list::-webkit-scrollbar {
            width: 5px;
        }
        .chapter-list::-webkit-scrollbar-thumb {
            background: #c8d9eb;
            border-radius: 10px;
        }
        .chapter-item {
            padding: 13px 15px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            font-size: 0.93rem;
            position: relative;
            border: 1.5px solid transparent;
            user-select: none;
            color: var(--text);
        }
        .chapter-item:hover {
            background: var(--primary-lighter);
            border-color: var(--primary-soft);
            transform: translateX(2px);
        }
        .chapter-item.active {
            background: linear-gradient(135deg, #e8f2fc 0%, #dcecf9 100%);
            border-color: var(--primary);
            color: var(--primary-dark);
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(74, 144, 217, 0.12);
        }
        .chapter-item .chapter-icon {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            background: var(--primary-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            flex-shrink: 0;
            transition: var(--transition);
        }
        .chapter-item.active .chapter-icon {
            background: var(--primary);
            color: #fff;
        }
        .chapter-item .chapter-info {
            flex: 1;
            min-width: 0;
        }
        .chapter-item .chapter-name {
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chapter-item .chapter-meta {
            font-size: 0.72rem;
            color: var(--text-muted);
            font-weight: 400;
        }
        .chapter-item .task-count-badge {
            font-size: 0.7rem;
            background: var(--primary-soft);
            color: var(--primary-dark);
            padding: 3px 9px;
            border-radius: 12px;
            font-weight: 600;
            flex-shrink: 0;
            transition: var(--transition);
        }
        .chapter-item.active .task-count-badge {
            background: var(--primary);
            color: #fff;
        }
        .chapter-item .delete-chapter-btn {
            opacity: 0;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: none;
            background: #fee2e2;
            color: #c0392b;
            cursor: pointer;
            font-size: 0.75rem;
            transition: var(--transition);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chapter-item:hover .delete-chapter-btn {
            opacity: 1;
        }
        .chapter-item .delete-chapter-btn:hover {
            background: #fca5a5;
            color: #fff;
        }

        /* ========== 右侧主内容区 ========== */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 0;
        }

        /* 统计卡片行 */
        .stats-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .stat-card {
            flex: 1;
            min-width: 160px;
            background: var(--white);
            border-radius: var(--radius);
            padding: 18px 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            gap: 14px;
            transition: var(--transition);
            cursor: default;
        }
        .stat-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
            border-color: var(--primary-soft);
        }
        .stat-card .stat-icon {
            width: 46px;
            height: 46px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
        }
        .stat-card .stat-icon.video {
            background: #e8f4fd;
            color: #4a90d9;
        }
        .stat-card .stat-icon.book {
            background: #fef3e0;
            color: #e8943e;
        }
        .stat-card .stat-icon.assignment {
            background: #e8faf0;
            color: #3cb878;
        }
        .stat-card .stat-icon.completion {
            background: #f0e8fd;
            color: #7c4dff;
        }
        .stat-card .stat-value {
            font-size: 1.7rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1;
        }
        .stat-card .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* 任务点面板 */
        .task-panel {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            border: 1px solid var(--border-light);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .task-panel-header {
            padding: 16px 22px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            background: #fafcfe;
        }
        .task-panel-header h2 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .task-panel-header h2 .highlight {
            color: var(--primary);
        }
        .btn-add-task {
            padding: 9px 18px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 22px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.88rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 8px rgba(74, 144, 217, 0.25);
            white-space: nowrap;
        }
        .btn-add-task:hover {
            background: var(--primary-dark);
            box-shadow: 0 4px 16px rgba(74, 144, 217, 0.35);
            transform: translateY(-1px);
        }
        .task-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .task-list::-webkit-scrollbar {
            width: 5px;
        }
        .task-list::-webkit-scrollbar-thumb {
            background: #c8d9eb;
            border-radius: 10px;
        }
        .task-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 15px 18px;
            border-radius: var(--radius);
            background: #fafcfe;
            border: 1.5px solid var(--border-light);
            transition: var(--transition);
            cursor: pointer;
            position: relative;
        }
        .task-item:hover {
            border-color: var(--primary-soft);
            box-shadow: var(--shadow-sm);
            background: #fff;
            transform: translateX(1px);
        }
        .task-item .task-type-icon {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
            font-weight: 700;
        }
        .task-item .task-type-icon.type-video {
            background: #e8f4fd;
            color: #4a90d9;
        }
        .task-item .task-type-icon.type-book {
            background: #fef3e0;
            color: #e8943e;
        }
        .task-item .task-type-icon.type-assignment {
            background: #e8faf0;
            color: #3cb878;
        }
        .task-item .task-details {
            flex: 1;
            min-width: 0;
        }
        .task-item .task-name {
            font-weight: 600;
            font-size: 0.93rem;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .task-item .task-meta-row {
            display: flex;
            gap: 14px;
            font-size: 0.76rem;
            color: var(--text-muted);
            margin-top: 3px;
            flex-wrap: wrap;
        }
        .task-item .required-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
            flex-shrink: 0;
        }
        .required-badge.required {
            background: #fde8e8;
            color: #c0392b;
        }
        .required-badge.optional {
            background: #e8f4fd;
            color: #4a90d9;
        }
        .task-item .task-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .task-item .task-actions button {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: #fff;
            cursor: pointer;
            font-size: 0.8rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-light);
        }
        .task-item .task-actions button:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-lighter);
        }
        .task-item .task-actions button.delete-btn:hover {
            border-color: #e74c3c;
            color: #e74c3c;
            background: #fef2f2;
        }
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-muted);
            font-size: 0.95rem;
        }
        .empty-state .empty-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 12px;
            opacity: 0.6;
        }

        /* ========== 模态框 ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(30, 50, 75, 0.45);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
            backdrop-filter: blur(2px);
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal-dialog {
            background: #fff;
            border-radius: var(--radius-xl);
            padding: 28px 30px;
            width: 520px;
            max-width: 94vw;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s ease;
            border: 1px solid var(--border-light);
        }
        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .modal-dialog h3 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 6px;
            color: var(--text);
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            font-size: 0.9rem;
            font-family: inherit;
            transition: var(--transition);
            background: #fafcfe;
            color: var(--text);
            resize: vertical;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.08);
            background: #fff;
        }
        .form-group textarea {
            min-height: 70px;
        }
        .form-row {
            display: flex;
            gap: 12px;
        }
        .form-row .form-group {
            flex: 1;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 22px;
        }
        .btn {
            padding: 10px 22px;
            border-radius: 22px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition);
            font-family: inherit;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 2px 8px rgba(74, 144, 217, 0.3);
        }
        .btn-primary:hover {
            background: var(--primary-dark);
            box-shadow: 0 4px 14px rgba(74, 144, 217, 0.4);
        }
        .btn-secondary {
            background: #eef3f8;
            color: var(--text);
            border: 1.5px solid var(--border);
        }
        .btn-secondary:hover {
            background: #dce6f0;
        }
        .btn-danger {
            background: #fff;
            color: #e74c3c;
            border: 1.5px solid #fca5a5;
        }
        .btn-danger:hover {
            background: #fef2f2;
        }

        /* ========== 学生进度面板（可折叠） ========== */
        .progress-panel {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            border: 1px solid var(--border-light);
            overflow: hidden;
            margin-top: 0;
        }
        .progress-panel-header {
            padding: 14px 22px;
            border-bottom: 1px solid var(--border-light);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fafcfe;
            user-select: none;
            transition: var(--transition);
        }
        .progress-panel-header:hover {
            background: #f0f5fa;
        }
        .progress-panel-header h3 {
            font-size: 1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .progress-panel-header .collapse-icon {
            transition: var(--transition);
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .progress-panel-header .collapse-icon.open {
            transform: rotate(180deg);
        }
        .progress-body {
            padding: 16px 22px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 280px;
            overflow-y: auto;
        }
        .progress-body::-webkit-scrollbar {
            width: 5px;
        }
        .progress-body::-webkit-scrollbar-thumb {
            background: #c8d9eb;
            border-radius: 10px;
        }
        .student-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            background: #fafcfe;
            border: 1px solid transparent;
            transition: var(--transition);
        }
        .student-row:hover {
            border-color: var(--border-light);
            background: #fff;
        }
        .student-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.75rem;
            color: #fff;
        }
        .student-info {
            flex: 1;
            min-width: 0;
        }
        .student-name {
            font-weight: 600;
            font-size: 0.88rem;
        }
        .student-progress-bar-wrap {
            height: 6px;
            background: #e8eff7;
            border-radius: 10px;
            margin-top: 5px;
            overflow: hidden;
            width: 100%;
            max-width: 200px;
        }
        .student-progress-bar-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
            background: linear-gradient(90deg, #4a90d9, #6ba3e0);
        }
        .student-progress-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            flex-shrink: 0;
            font-weight: 600;
            min-width: 40px;
            text-align: right;
        }
        .student-status {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 600;
            flex-shrink: 0;
        }
        .student-status.completed {
            background: #e8faf0;
            color: #27ae60;
        }
        .student-status.in-progress {
            background: #fef3e0;
            color: #e8943e;
        }
        .student-status.not-started {
            background: #fde8e8;
            color: #c0392b;
        }

        /* ========== 响应式 ========== */
        @media (max-width: 900px) {
            .main-container {
                flex-direction: column;
                padding: 12px;
                gap: 12px;
            }
            .sidebar {
                width: 100%;
                min-width: 100%;
                max-height: 240px;
            }
            .stats-row {
                flex-wrap: wrap;
                gap: 8px;
            }
            .stat-card {
                min-width: 42%;
                flex: 1 1 42%;
                padding: 14px 16px;
            }
            .stat-card .stat-value {
                font-size: 1.3rem;
            }
            .navbar {
                padding: 0 16px;
            }
            .navbar .logo-area {
                font-size: 1rem;
            }
            .task-panel-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .form-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== 顶部导航栏 ==================== -->
    <nav class="navbar">
        <div class="logo-area">
            <div class="logo-icon">📚</div>
            <span>学习任务点设计平台</span>
        </div>
        <div class="nav-actions">
            <span style="font-size:0.85rem;opacity:0.9;">📅 2026年春季学期</span>
            <div class="teacher-badge" title="当前教师账号">
                <div class="avatar-dot">张</div>
                <span>张教授 · 教师端</span>
            </div>
        </div>
    </nav>

    <!-- ==================== 主布局 ==================== -->
    <div class="main-container">
        <!-- 左侧：章节树 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3><span class="icon">📑</span>课程章节</h3>
                <button class="btn-add-chapter" id="btnAddChapter" title="添加新章节">+</button>
            </div>
            <ul class="chapter-list" id="chapterList">
                <!-- 动态渲染章节 -->
            </ul>
        </aside>

        <!-- 右侧内容区 -->
        <div class="content-area">
            <!-- 统计卡片 -->
            <div class="stats-row" id="statsRow">
                <div class="stat-card">
                    <div class="stat-icon video">🎬</div>
                    <div><div class="stat-value" id="statVideo">0</div><div class="stat-label">视频任务点</div></div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon book">📖</div>
                    <div><div class="stat-value" id="statBook">0</div><div class="stat-label">图书任务点</div></div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon assignment">📝</div>
                    <div><div class="stat-value" id="statAssignment">0</div><div class="stat-label">作业任务点</div></div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon completion">✅</div>
                    <div><div class="stat-value" id="statCompletion">0%</div><div class="stat-label">学生整体完成率</div></div>
                </div>
            </div>

            <!-- 任务点列表面板 -->
            <div class="task-panel" id="taskPanel">
                <div class="task-panel-header">
                    <h2>📋 <span class="highlight" id="currentChapterTitle">请选择章节</span> — 任务点列表</h2>
                    <button class="btn-add-task" id="btnAddTask" disabled>＋ 添加任务点</button>
                </div>
                <div class="task-list" id="taskList">
                    <div class="empty-state">
                        <span class="empty-icon">📂</span>
                        <p>请先选择左侧章节，然后添加任务点</p>
                        <p style="font-size:0.8rem;">支持视频、图书、作业三种类型</p>
                    </div>
                </div>
            </div>

            <!-- 学生学习进度面板（可折叠） -->
            <div class="progress-panel" id="progressPanel">
                <div class="progress-panel-header" id="progressPanelHeader">
                    <h3>👨‍🎓 学生完成进度一览 <span style="font-weight:400;font-size:0.8rem;color:var(--text-muted);">（点击展开/折叠）</span></h3>
                    <span class="collapse-icon open" id="collapseIcon">▼</span>
                </div>
                <div class="progress-body" id="progressBody">
                    <!-- 动态渲染学生进度 -->
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== 添加/编辑任务点模态框 ==================== -->
    <div class="modal-overlay" id="taskModal" style="display:none;">
        <div class="modal-dialog">
            <h3 id="taskModalTitle">📌 添加任务点</h3>
            <div class="form-group">
                <label>任务点类型 *</label>
                <select id="taskType">
                    <option value="video">🎬 视频</option>
                    <option value="book">📖 图书</option>
                    <option value="assignment">📝 作业</option>
                </select>
            </div>
            <div class="form-group">
                <label>任务点名称 *</label>
                <input type="text" id="taskName" placeholder="请输入任务点名称，如：观看教学视频1">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>资源链接/URL</label>
                    <input type="text" id="taskUrl" placeholder="视频链接、图书ISBN或作业链接">
                </div>
                <div class="form-group">
                    <label>预计时长（分钟）</label>
                    <input type="number" id="taskDuration" placeholder="如：30" min="1" value="30">
                </div>
            </div>
            <div class="form-group">
                <label>是否必修</label>
                <select id="taskRequired">
                    <option value="required">🔴 必修（学生必须完成）</option>
                    <option value="optional">🔵 选修（学生可选完成）</option>
                </select>
            </div>
            <div class="form-group">
                <label>备注说明</label>
                <textarea id="taskNote" placeholder="可选：补充说明该任务点的要求"></textarea>
            </div>
            <input type="hidden" id="editingTaskId" value="">
            <div class="modal-actions">
                <button class="btn btn-secondary" id="btnCancelTask">取消</button>
                <button class="btn btn-danger" id="btnDeleteTaskInModal" style="display:none;">删除任务点</button>
                <button class="btn btn-primary" id="btnSaveTask">💾 保存任务点</button>
            </div>
        </div>
    </div>

    <!-- ==================== 添加章节模态框 ==================== -->
    <div class="modal-overlay" id="chapterModal" style="display:none;">
        <div class="modal-dialog" style="width:420px;">
            <h3>📑 添加新章节</h3>
            <div class="form-group">
                <label>章节名称 *</label>
                <input type="text" id="chapterNameInput" placeholder="如：第一章 导论">
            </div>
            <div class="form-group">
                <label>章节描述</label>
                <textarea id="chapterDescInput" placeholder="可选：章节简要描述" rows="2"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="btnCancelChapter">取消</button>
                <button class="btn btn-primary" id="btnSaveChapter">💾 保存章节</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ==================== 数据模型 ====================
            // 章节数据
            let chapters = [{
                id: 'ch1',
                name: '第一章 课程导论',
                desc: '介绍课程整体框架与学习目标',
                tasks: [
                    { id: 't1', type: 'video', name: '课程导学视频', url: 'https://example.com/video1',
                        duration: 25, required: 'required', note: '必须完整观看' },
                    { id: 't2', type: 'book', name: '参考书目《教育技术导论》第1-2章', url: 'ISBN-978-7-123456',
                        duration: 60, required: 'required', note: '阅读并做笔记' },
                    { id: 't3', type: 'assignment', name: '导论课后作业', url: 'https://example.com/hw1',
                        duration: 40, required: 'optional', note: '选做，加分项' },
                ]
            }, {
                id: 'ch2',
                name: '第二章 核心理论',
                desc: '深入理解核心理论体系',
                tasks: [
                    { id: 't4', type: 'video', name: '核心理论讲解视频', url: 'https://example.com/video2',
                        duration: 35, required: 'required', note: '' },
                    { id: 't5', type: 'assignment', name: '理论应用分析作业', url: 'https://example.com/hw2',
                        duration: 90, required: 'required', note: '小组作业' },
                ]
            }, {
                id: 'ch3',
                name: '第三章 实践案例',
                desc: '通过案例学习实践应用',
                tasks: [
                    { id: 't6', type: 'video', name: '案例解析视频合集', url: 'https://example.com/video3',
                        duration: 45, required: 'required', note: '含3个子视频' },
                    { id: 't7', type: 'book', name: '《实践案例手册》全文阅读', url: 'ISBN-978-7-654321',
                        duration: 120, required: 'optional', note: '推荐阅读' },
                    { id: 't8', type: 'assignment', name: '案例分析报告', url: 'https://example.com/hw3',
                        duration: 60, required: 'required', note: '个人独立完成' },
                    { id: 't9', type: 'video', name: '专家访谈实录', url: 'https://example.com/video4',
                        duration: 50, required: 'optional', note: '拓展内容' },
                ]
            }];

            // 模拟学生数据
            const students = [
                { id: 's1', name: '李同学', color: '#4a90d9', progress: { t1: true, t2: true, t3: false, t4: true,
                        t5: false, t6: true, t7: false, t8: false, t9: false } },
                { id: 's2', name: '王同学', color: '#e8943e', progress: { t1: true, t2: false, t3: true, t4: true,
                        t5: true, t6: false, t7: true, t8: true, t9: true } },
                { id: 's3', name: '赵同学', color: '#3cb878', progress: { t1: true, t2: true, t3: true, t4: true,
                        t5: true, t6: true, t7: true, t8: true, t9: true } },
                { id: 's4', name: '陈同学', color: '#7c4dff', progress: { t1: false, t2: false, t3: false, t4: false,
                        t5: false, t6: false, t7: false, t8: false, t9: false } },
            ];

            let currentChapterId = null;
            let editingTaskId = null;
            let progressPanelOpen = true;

            // ==================== DOM引用 ====================
            const chapterListEl = document.getElementById('chapterList');
            const taskListEl = document.getElementById('taskList');
            const currentChapterTitleEl = document.getElementById('currentChapterTitle');
            const btnAddTask = document.getElementById('btnAddTask');
            const btnAddChapter = document.getElementById('btnAddChapter');
            const taskModal = document.getElementById('taskModal');
            const chapterModal = document.getElementById('chapterModal');
            const taskModalTitle = document.getElementById('taskModalTitle');
            const taskTypeEl = document.getElementById('taskType');
            const taskNameEl = document.getElementById('taskName');
            const taskUrlEl = document.getElementById('taskUrl');
            const taskDurationEl = document.getElementById('taskDuration');
            const taskRequiredEl = document.getElementById('taskRequired');
            const taskNoteEl = document.getElementById('taskNote');
            const editingTaskIdEl = document.getElementById('editingTaskId');
            const btnSaveTask = document.getElementById('btnSaveTask');
            const btnCancelTask = document.getElementById('btnCancelTask');
            const btnDeleteTaskInModal = document.getElementById('btnDeleteTaskInModal');
            const btnSaveChapter = document.getElementById('btnSaveChapter');
            const btnCancelChapter = document.getElementById('btnCancelChapter');
            const chapterNameInput = document.getElementById('chapterNameInput');
            const chapterDescInput = document.getElementById('chapterDescInput');
            const progressPanelHeader = document.getElementById('progressPanelHeader');
            const progressBody = document.getElementById('progressBody');
            const collapseIcon = document.getElementById('collapseIcon');
            const statVideo = document.getElementById('statVideo');
            const statBook = document.getElementById('statBook');
            const statAssignment = document.getElementById('statAssignment');
            const statCompletion = document.getElementById('statCompletion');

            // ==================== 工具函数 ====================
            function getChapterById(id) {
                return chapters.find(ch => ch.id === id);
            }

            function getTaskById(chapterId, taskId) {
                const chapter = getChapterById(chapterId);
                if (!chapter) return null;
                return chapter.tasks.find(t => t.id === taskId) || null;
            }

            function generateId(prefix = 'id') {
                return prefix + '_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            }

            function countTasksByType(chapter, type) {
                if (!chapter) return 0;
                return chapter.tasks.filter(t => t.type === type).length;
            }

            function getAllTasks() {
                let all = [];
                chapters.forEach(ch => {
                    ch.tasks.forEach(t => all.push({ ...t, chapterId: ch.id, chapterName: ch.name }));
                });
                return all;
            }

            // ==================== 渲染函数 ====================
            function renderChapters() {
                chapterListEl.innerHTML = '';
                chapters.forEach(ch => {
                    const li = document.createElement('li');
                    li.className = 'chapter-item' + (ch.id === currentChapterId ? ' active' : '');
                    li.dataset.chapterId = ch.id;
                    li.innerHTML = `
                        <div class="chapter-icon">📘</div>
                        <div class="chapter-info">
                            <div class="chapter-name">${escapeHtml(ch.name)}</div>
                            <div class="chapter-meta">${ch.tasks.length} 个任务点</div>
                        </div>
                        <span class="task-count-badge">${ch.tasks.length}</span>
                        <button class="delete-chapter-btn" data-action="delete-chapter" data-chapter-id="${ch.id}" title="删除章节">×</button>
                    `;
                    li.addEventListener('click', function(e) {
                        // 如果点击的是删除按钮，不触发选中
                        if (e.target.closest('[data-action="delete-chapter"]')) return;
                        selectChapter(ch.id);
                    });
                    chapterListEl.appendChild(li);
                });
                // 绑定删除章节按钮
                chapterListEl.querySelectorAll('[data-action="delete-chapter"]').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const chId = this.dataset.chapterId;
                        deleteChapter(chId);
                    });
                });
            }

            function renderTasks() {
                const chapter = getChapterById(currentChapterId);
                if (!chapter) {
                    taskListEl.innerHTML = `
                        <div class="empty-state">
                            <span class="empty-icon">📂</span>
                            <p>请先选择左侧章节，然后添加任务点</p>
                            <p style="font-size:0.8rem;">支持视频、图书、作业三种类型</p>
                        </div>`;
                    currentChapterTitleEl.textContent = '请选择章节';
                    btnAddTask.disabled = true;
                    return;
                }
                currentChapterTitleEl.textContent = chapter.name;
                btnAddTask.disabled = false;
                if (chapter.tasks.length === 0) {
                    taskListEl.innerHTML = `
                        <div class="empty-state">
                            <span class="empty-icon">📭</span>
                            <p>该章节暂无任务点</p>
                            <p style="font-size:0.8rem;">点击右上角按钮添加视频、图书或作业任务点</p>
                        </div>`;
                } else {
                    taskListEl.innerHTML = '';
                    chapter.tasks.forEach(task => {
                        const typeLabels = { video: '🎬 视频', book: '📖 图书', assignment: '📝 作业' };
                        const typeIconClass = 'type-' + task.type;
                        const typeEmoji = { video: '🎬', book: '📖', assignment: '📝' };
                        const requiredClass = task.required === 'required' ? 'required' :
                            'optional';
                        const requiredText = task.required === 'required' ? '必修' : '选修';
                        const div = document.createElement('div');
                        div.className = 'task-item';
                        div.dataset.taskId = task.id;
                        div.innerHTML = `
                            <div class="task-type-icon ${typeIconClass}">${typeEmoji[task.type]}</div>
                            <div class="task-details">
                                <div class="task-name">${escapeHtml(task.name)}</div>
                                <div class="task-meta-row">
                                    <span>⏱ ${task.duration}分钟</span>
                                    <span>${task.url ? '🔗 有资源链接' : '📎 无链接'}</span>
                                    <span class="required-badge ${requiredClass}">${requiredText}</span>
                                    ${task.note ? `<span>💬 ${escapeHtml(task.note)}</span>` : ''}
                                </div>
                            </div>
                            <div class="task-actions">
                                <button data-action="edit-task" data-task-id="${task.id}" title="编辑">✎</button>
                                <button class="delete-btn" data-action="delete-task" data-task-id="${task.id}" title="删除">🗑</button>
                            </div>
                        `;
                        // 点击任务项编辑
                        div.addEventListener('click', function(e) {
                            if (e.target.closest('button')) return;
                            openTaskModal(task.id);
                        });
                        taskListEl.appendChild(div);
                    });
                    // 绑定编辑和删除按钮
                    taskListEl.querySelectorAll('[data-action="edit-task"]').forEach(btn => {
                        btn.addEventListener('click', function(e) {
                            e.stopPropagation();
                            openTaskModal(this.dataset.taskId);
                        });
                    });
                    taskListEl.querySelectorAll('[data-action="delete-task"]').forEach(btn => {
                        btn.addEventListener('click', function(e) {
                            e.stopPropagation();
                            deleteTask(this.dataset.taskId);
                        });
                    });
                }
                updateStats();
                renderProgress();
            }

            function renderProgress() {
                const allTasks = getAllTasks();
                if (allTasks.length === 0) {
                    progressBody.innerHTML =
                        '<p style="text-align:center;color:var(--text-muted);padding:20px;">暂无任务点数据，无法显示学生进度</p>';
                    return;
                }
                progressBody.innerHTML = '';
                students.forEach(student => {
                    let completedCount = 0;
                    let totalAssigned = 0;
                    allTasks.forEach(t => {
                        // 只统计必修任务 或 所有任务（这里统计所有分配的任务）
                        totalAssigned++;
                        if (student.progress[t.id]) completedCount++;
                    });
                    const pct = totalAssigned > 0 ? Math.round((completedCount / totalAssigned) *
                        100) : 0;
                    let statusClass = 'not-started';
                    let statusText = '未开始';
                    if (pct >= 100) { statusClass = 'completed';
                        statusText = '已完成'; } else if (pct > 0) { statusClass = 'in-progress';
                        statusText = '进行中'; }
                    const row = document.createElement('div');
                    row.className = 'student-row';
                    row.innerHTML = `
                        <div class="student-avatar" style="background:${student.color};">${student.name.charAt(0)}</div>
                        <div class="student-info">
                            <div class="student-name">${student.name}</div>
                            <div class="student-progress-bar-wrap">
                                <div class="student-progress-bar-fill" style="width:${pct}%;"></div>
                            </div>
                        </div>
                        <span class="student-progress-text">${pct}%</span>
                        <span class="student-status ${statusClass}">${statusText}</span>
                    `;
                    progressBody.appendChild(row);
                });
            }

            function updateStats() {
                const chapter = getChapterById(currentChapterId);
                let vCount = 0,
                    bCount = 0,
                    aCount = 0;
                if (chapter) {
                    vCount = countTasksByType(chapter, 'video');
                    bCount = countTasksByType(chapter, 'book');
                    aCount = countTasksByType(chapter, 'assignment');
                } else {
                    // 显示全部章节合计
                    chapters.forEach(ch => {
                        vCount += countTasksByType(ch, 'video');
                        bCount += countTasksByType(ch, 'book');
                        aCount += countTasksByType(ch, 'assignment');
                    });
                }
                statVideo.textContent = vCount;
                statBook.textContent = bCount;
                statAssignment.textContent = aCount;
                // 整体完成率
                const allTasks = getAllTasks();
                if (allTasks.length === 0) {
                    statCompletion.textContent = '0%';
                } else {
                    let totalProgress = 0;
                    students.forEach(s => {
                        let comp = 0;
                        allTasks.forEach(t => { if (s.progress[t.id]) comp++; });
                        totalProgress += comp / allTasks.length;
                    });
                    const avg = Math.round((totalProgress / students.length) * 100);
                    statCompletion.textContent = avg + '%';
                }
            }

            function selectChapter(chapterId) {
                currentChapterId = chapterId;
                renderChapters();
                renderTasks();
                updateStats();
                renderProgress();
            }

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ==================== 任务点CRUD ====================
            function openTaskModal(taskId = null) {
                if (!currentChapterId && !taskId) {
                    alert('请先选择一个章节！');
                    return;
                }
                editingTaskId = taskId;
                if (taskId) {
                    const task = getTaskById(currentChapterId, taskId);
                    if (!task) return;
                    taskModalTitle.textContent = '✏️ 编辑任务点';
                    taskTypeEl.value = task.type;
                    taskNameEl.value = task.name;
                    taskUrlEl.value = task.url || '';
                    taskDurationEl.value = task.duration;
                    taskRequiredEl.value = task.required;
                    taskNoteEl.value = task.note || '';
                    editingTaskIdEl.value = taskId;
                    btnDeleteTaskInModal.style.display = 'inline-block';
                } else {
                    taskModalTitle.textContent = '📌 添加任务点';
                    taskTypeEl.value = 'video';
                    taskNameEl.value = '';
                    taskUrlEl.value = '';
                    taskDurationEl.value = '30';
                    taskRequiredEl.value = 'required';
                    taskNoteEl.value = '';
                    editingTaskIdEl.value = '';
                    btnDeleteTaskInModal.style.display = 'none';
                }
                taskModal.style.display = 'flex';
                taskNameEl.focus();
            }

            function closeTaskModal() {
                taskModal.style.display = 'none';
                editingTaskId = null;
                editingTaskIdEl.value = '';
                btnDeleteTaskInModal.style.display = 'none';
            }

            function saveTask() {
                const type = taskTypeEl.value;
                const name = taskNameEl.value.trim();
                const url = taskUrlEl.value.trim();
                const duration = parseInt(taskDurationEl.value) || 30;
                const required = taskRequiredEl.value;
                const note = taskNoteEl.value.trim();
                if (!name) {
                    alert('请输入任务点名称！');
                    taskNameEl.focus();
                    return;
                }
                if (!currentChapterId) {
                    alert('请先选择章节！');
                    return;
                }
                const chapter = getChapterById(currentChapterId);
                if (!chapter) return;
                const taskId = editingTaskIdEl.value;
                if (taskId) {
                    // 编辑模式
                    const task = chapter.tasks.find(t => t.id === taskId);
                    if (task) {
                        task.type = type;
                        task.name = name;
                        task.url = url;
                        task.duration = duration;
                        task.required = required;
                        task.note = note;
                    }
                } else {
                    // 新增模式
                    const newTask = {
                        id: generateId('task'),
                        type: type,
                        name: name,
                        url: url,
                        duration: duration,
                        required: required,
                        note: note,
                    };
                    chapter.tasks.push(newTask);
                    // 为新任务初始化学生进度
                    students.forEach(s => { s.progress[newTask.id] = false; });
                }
                closeTaskModal();
                renderChapters();
                renderTasks();
                updateStats();
                renderProgress();
            }

            function deleteTask(taskId) {
                if (!currentChapterId) return;
                const chapter = getChapterById(currentChapterId);
                if (!chapter) return;
                if (!confirm('确定要删除该任务点吗？此操作不可恢复。')) return;
                chapter.tasks = chapter.tasks.filter(t => t.id !== taskId);
                // 清理学生进度
                students.forEach(s => { delete s.progress[taskId]; });
                renderChapters();
                renderTasks();
                updateStats();
                renderProgress();
            }

            function deleteTaskFromModal() {
                const taskId = editingTaskIdEl.value;
                if (taskId) {
                    deleteTask(taskId);
                    closeTaskModal();
                }
            }

            // ==================== 章节CRUD ====================
            function openChapterModal() {
                chapterNameInput.value = '';
                chapterDescInput.value = '';
                chapterModal.style.display = 'flex';
                chapterNameInput.focus();
            }

            function closeChapterModal() {
                chapterModal.style.display = 'none';
            }

            function saveChapter() {
                const name = chapterNameInput.value.trim();
                const desc = chapterDescInput.value.trim();
                if (!name) {
                    alert('请输入章节名称！');
                    chapterNameInput.focus();
                    return;
                }
                const newChapter = {
                    id: generateId('ch'),
                    name: name,
                    desc: desc,
                    tasks: [],
                };
                chapters.push(newChapter);
                closeChapterModal();
                renderChapters();
                // 自动选中新章节
                selectChapter(newChapter.id);
            }

            function deleteChapter(chapterId) {
                const chapter = getChapterById(chapterId);
                if (!chapter) return;
                if (!confirm(`确定要删除章节"${chapter.name}"及其所有任务点吗？此操作不可恢复。`)) return;
                // 清理学生进度中该章节的任务
                const taskIds = chapter.tasks.map(t => t.id);
                students.forEach(s => { taskIds.forEach(tid => delete s.progress[tid]); });
                chapters = chapters.filter(ch => ch.id !== chapterId);
                if (currentChapterId === chapterId) {
                    currentChapterId = chapters.length > 0 ? chapters[0].id : null;
                }
                renderChapters();
                if (currentChapterId) {
                    selectChapter(currentChapterId);
                } else {
                    currentChapterTitleEl.textContent = '请选择章节';
                    btnAddTask.disabled = true;
                    taskListEl.innerHTML = `
                        <div class="empty-state">
                            <span class="empty-icon">📂</span>
                            <p>请先选择左侧章节，然后添加任务点</p>
                        </div>`;
                    updateStats();
                    renderProgress();
                }
            }

            // ==================== 进度面板折叠 ====================
            function toggleProgressPanel() {
                progressPanelOpen = !progressPanelOpen;
                if (progressPanelOpen) {
                    progressBody.style.display = 'flex';
                    collapseIcon.classList.add('open');
                    collapseIcon.classList.remove('closed');
                } else {
                    progressBody.style.display = 'none';
                    collapseIcon.classList.remove('open');
                    collapseIcon.classList.add('closed');
                }
            }

            // ==================== 事件绑定 ====================
            btnAddTask.addEventListener('click', () => openTaskModal(null));
            btnAddChapter.addEventListener('click', openChapterModal);
            btnSaveTask.addEventListener('click', saveTask);
            btnCancelTask.addEventListener('click', closeTaskModal);
            btnDeleteTaskInModal.addEventListener('click', deleteTaskFromModal);
            btnSaveChapter.addEventListener('click', saveChapter);
            btnCancelChapter.addEventListener('click', closeChapterModal);
            progressPanelHeader.addEventListener('click', toggleProgressPanel);

            // 点击模态框背景关闭
            taskModal.addEventListener('click', function(e) {
                if (e.target === taskModal) closeTaskModal();
            });
            chapterModal.addEventListener('click', function(e) {
                if (e.target === chapterModal) closeChapterModal();
            });

            // 键盘快捷键
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    if (taskModal.style.display === 'flex') closeTaskModal();
                    if (chapterModal.style.display === 'flex') closeChapterModal();
                }
                // Ctrl+N 添加任务点
                if (e.ctrlKey && e.key === 'n' && currentChapterId) {
                    e.preventDefault();
                    openTaskModal(null);
                }
            });

            // ==================== 初始化 ====================
            function init() {
                renderChapters();
                // 默认选中第一个章节
                if (chapters.length > 0) {
                    selectChapter(chapters[0].id);
                } else {
                    currentChapterTitleEl.textContent = '请选择章节';
                    btnAddTask.disabled = true;
                    updateStats();
                    renderProgress();
                }
                progressBody.style.display = 'flex';
                collapseIcon.classList.add('open');
                console.log('✅ 学习任务点设计平台已就绪');
                console.log('   📘 教师可管理章节与任务点（视频/图书/作业）');
                console.log('   👨‍🎓 学生进度面板实时反映完成情况');
                console.log('   ⌨️ 快捷键：Ctrl+N 快速添加任务点，Esc 关闭弹窗');
            }

            init();
        })();
    </script>
</body>
</html>
