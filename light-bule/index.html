<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧课程建设平台 - 天蓝版</title>
    <style>
        :root {
            --primary: #4A9ED6;
            --primary-dark: #357CAB;
            --primary-light: #6DB9E8;
            --primary-bg: #EAF4FB;
            --primary-bg-deep: #D6ECF8;
            --sidebar-bg: #F5F9FC;
            --sidebar-hover: #E1F0F8;
            --sidebar-active: #D0E8F5;
            --white: #FFFFFF;
            --text: #2C3E50;
            --text-secondary: #5A6F80;
            --text-light: #7B8FA0;
            --border: #D9E6F0;
            --border-light: #E8F0F6;
            --shadow-sm: 0 1px 3px rgba(74, 158, 214, 0.08);
            --shadow: 0 2px 12px rgba(74, 158, 214, 0.12);
            --shadow-lg: 0 8px 32px rgba(74, 158, 214, 0.16);
            --radius-sm: 6px;
            --radius: 10px;
            --radius-lg: 14px;
            --radius-xl: 18px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: #EDF4FA;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* ========== 顶部导航栏 ========== */
        .top-nav {
            background: linear-gradient(135deg, #4A9ED6 0%, #5BAFE0 30%, #3D8CC4 100%);
            color: #fff;
            height: 58px;
            display: flex;
            align-items: center;
            padding: 0 24px;
            box-shadow: 0 2px 16px rgba(58, 120, 180, 0.25);
            position: sticky;
            top: 0;
            z-index: 100;
            gap: 16px;
        }
        .top-nav .logo-area {
            display: flex;
            align-items: center;
            gap: 11px;
            flex-shrink: 0;
        }
        .top-nav .logo-icon {
            width: 38px;
            height: 38px;
            background: rgba(255, 255, 255, 0.22);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .top-nav .logo-text {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .top-nav .nav-links {
            display: flex;
            gap: 4px;
            margin-left: 36px;
        }
        .top-nav .nav-link {
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            transition: var(--transition);
            cursor: pointer;
            white-space: nowrap;
        }
        .top-nav .nav-link:hover,
        .top-nav .nav-link.active {
            background: rgba(255, 255, 255, 0.18);
            color: #fff;
        }
        .top-nav .spacer {
            flex: 1;
        }
        .top-nav .user-info {
            display: flex;
            align-items: center;
            gap: 9px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            padding: 6px 14px;
            border-radius: 20px;
            transition: var(--transition);
            white-space: nowrap;
        }
        .top-nav .user-info:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        .top-nav .avatar {
            width: 33px;
            height: 33px;
            border-radius: 50%;
            background: #fff;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 15px;
        }

        /* ========== 主体布局 ========== */
        .main-container {
            display: flex;
            flex: 1;
            min-height: calc(100vh - 58px);
        }

        /* ========== 侧边栏 ========== */
        .sidebar {
            width: 230px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-light);
            padding: 16px 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex-shrink: 0;
            box-shadow: var(--shadow-sm);
            z-index: 50;
            transition: var(--transition);
        }
        .sidebar .menu-section {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-light);
            padding: 12px 12px 6px;
            font-weight: 600;
        }
        .sidebar .menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 14px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: var(--transition);
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            user-select: none;
            position: relative;
        }
        .sidebar .menu-item:hover {
            background: var(--sidebar-hover);
            color: var(--primary-dark);
        }
        .sidebar .menu-item.active {
            background: var(--sidebar-active);
            color: var(--primary-dark);
            font-weight: 600;
            box-shadow: inset 3px 0 0 var(--primary);
        }
        .sidebar .menu-icon {
            font-size: 18px;
            width: 22px;
            text-align: center;
            flex-shrink: 0;
        }
        .sidebar .badge {
            margin-left: auto;
            background: var(--primary);
            color: #fff;
            font-size: 11px;
            padding: 2px 9px;
            border-radius: 12px;
            font-weight: 600;
            min-width: 22px;
            text-align: center;
        }
        .sidebar .divider {
            height: 1px;
            background: var(--border-light);
            margin: 8px 10px;
        }

        /* ========== 内容区 ========== */
        .content-area {
            flex: 1;
            padding: 24px 28px;
            overflow-y: auto;
            background: #EDF4FA;
            transition: var(--transition);
        }
        .content-area .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 22px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .content-area .page-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 0.3px;
        }
        .content-area .page-subtitle {
            font-size: 13px;
            color: var(--text-light);
            margin-top: 2px;
        }

        /* ========== 按钮 ========== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 10px 20px;
            border-radius: 22px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: var(--transition);
            text-decoration: none;
            white-space: nowrap;
            letter-spacing: 0.3px;
            font-family: var(--font);
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 3px 12px rgba(74, 158, 214, 0.3);
        }
        .btn-primary:hover {
            background: var(--primary-dark);
            box-shadow: 0 5px 18px rgba(74, 158, 214, 0.4);
            transform: translateY(-1px);
        }
        .btn-outline {
            background: var(--white);
            color: var(--primary-dark);
            border: 1.5px solid var(--primary);
        }
        .btn-outline:hover {
            background: var(--primary-bg);
            border-color: var(--primary-dark);
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 12px;
            border-radius: 16px;
            gap: 4px;
        }
        .btn-xs {
            padding: 4px 10px;
            font-size: 11px;
            border-radius: 12px;
            gap: 3px;
        }
        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            border: none;
            box-shadow: none;
            padding: 8px 14px;
        }
        .btn-ghost:hover {
            background: var(--sidebar-hover);
            color: var(--primary-dark);
        }
        .btn-danger {
            background: #fff;
            color: #e05555;
            border: 1.5px solid #f5c6c6;
        }
        .btn-danger:hover {
            background: #fef5f5;
            border-color: #e05555;
        }
        .btn-success {
            background: #4CB8A5;
            color: #fff;
        }
        .btn-success:hover {
            background: #3DA593;
        }

        /* ========== 课程卡片网格 ========== */
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 18px;
        }
        .course-card {
            background: #fff;
            border-radius: var(--radius-lg);
            padding: 20px 22px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-light);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            gap: 10px;
            cursor: default;
            position: relative;
            overflow: hidden;
        }
        .course-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
            border-color: #C5DFF0;
        }
        .course-card .card-accent {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, #4A9ED6, #6DB9E8, #8EC8F0);
        }
        .course-card .card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
        }
        .course-card .course-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.3;
            flex: 1;
        }
        .course-card .course-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 12px;
            color: var(--text-light);
        }
        .course-card .meta-tag {
            background: var(--primary-bg);
            color: var(--primary-dark);
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 500;
            font-size: 11px;
            white-space: nowrap;
        }
        .course-card .card-actions {
            display: flex;
            gap: 6px;
            margin-top: 4px;
            flex-wrap: wrap;
        }
        .course-card .resource-count {
            font-size: 12px;
            color: var(--primary);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* ========== 资源库表格样式 ========== */
        .resource-table-wrap {
            background: #fff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            border: 1px solid var(--border-light);
            overflow: hidden;
        }
        .resource-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .resource-table thead th {
            background: #F5F9FC;
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 12px;
            letter-spacing: 0.4px;
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
        }
        .resource-table tbody td {
            padding: 13px 16px;
            border-bottom: 1px solid var(--border-light);
            vertical-align: middle;
        }
        .resource-table tbody tr {
            transition: var(--transition);
        }
        .resource-table tbody tr:hover {
            background: #F8FBFD;
        }
        .resource-table .res-type-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
        }
        .badge-ppt {
            background: #FFF3E0;
            color: #E67E22;
        }
        .badge-doc {
            background: #E8F4FD;
            color: #357CAB;
        }
        .badge-video {
            background: #FDE8EC;
            color: #C0392B;
        }
        .badge-case {
            background: #E8F8F0;
            color: #27AE60;
        }
        .badge-other {
            background: #F3F0FA;
            color: #6C5CE7;
        }
        .resource-table .res-name-link {
            color: var(--primary-dark);
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: var(--transition);
        }
        .resource-table .res-name-link:hover {
            color: #2C6AA0;
            text-decoration: underline;
        }

        /* ========== 模态框 ========== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(30, 50, 70, 0.5);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        .modal-overlay.closing {
            animation: fadeOut 0.18s ease forwards;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @keyframes fadeOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
            }
        }
        .modal {
            background: #fff;
            border-radius: var(--radius-xl);
            width: 90%;
            max-width: 720px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(40, 80, 120, 0.25);
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .modal-header {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            background: #FAFCFE;
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
        }
        .modal-header h3 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }
        .modal-close {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: none;
            background: #f0f4f8;
            cursor: pointer;
            font-size: 18px;
            color: var(--text-light);
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-close:hover {
            background: #e0e8f0;
            color: #333;
        }
        .modal-body {
            padding: 20px 24px;
            overflow-y: auto;
            flex: 1;
        }
        .modal-footer {
            padding: 14px 24px;
            border-top: 1px solid var(--border-light);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            background: #FAFCFE;
            border-radius: 0 0 var(--radius-xl) var(--radius-xl);
        }
        /* 表单 */
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 5px;
            letter-spacing: 0.3px;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: var(--font);
            transition: var(--transition);
            background: #FAFCFE;
            color: var(--text);
            resize: vertical;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(74, 158, 214, 0.1);
            background: #fff;
        }
        .form-row {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }
        .form-row .form-group {
            flex: 1;
            min-width: 140px;
        }
        /* 资源选择区 */
        .resource-picker {
            border: 1.5px dashed var(--border);
            border-radius: var(--radius);
            padding: 14px;
            background: #FAFCFE;
            max-height: 200px;
            overflow-y: auto;
        }
        .resource-picker .picker-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            font-size: 13px;
        }
        .resource-picker .picker-item:hover {
            background: var(--primary-bg);
        }
        .resource-picker .picker-item.selected {
            background: #D6ECF8;
            font-weight: 600;
        }
        .resource-picker input[type="checkbox"] {
            accent-color: var(--primary);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .picker-header {
            font-weight: 700;
            font-size: 13px;
            color: var(--text);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .picker-header .icon-highlight {
            color: #E67E22;
            font-size: 16px;
        }

        /* ========== Toast提示 ========== */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toast {
            background: #fff;
            padding: 12px 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 9px;
            animation: toastIn 0.3s ease;
            border-left: 4px solid var(--primary);
            min-width: 200px;
            max-width: 380px;
        }
        .toast.success {
            border-left-color: #4CB8A5;
        }
        .toast.error {
            border-left-color: #e05555;
        }
        @keyframes toastIn {
            from {
                transform: translateX(120%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes toastOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(120%);
                opacity: 0;
            }
        }

        /* ========== 空状态 ========== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }
        .empty-state .empty-icon {
            font-size: 56px;
            margin-bottom: 16px;
            opacity: 0.6;
        }
        .empty-state p {
            font-size: 15px;
            margin-bottom: 16px;
        }

        /* ========== 搜索栏 ========== */
        .search-bar {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .search-input {
            padding: 9px 16px;
            border: 1.5px solid var(--border);
            border-radius: 22px;
            font-size: 13px;
            width: 240px;
            transition: var(--transition);
            background: #fff;
            font-family: var(--font);
        }
        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(74, 158, 214, 0.08);
            width: 280px;
        }

        /* ========== 标签 ========== */
        .tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .tag-blue {
            background: #E1F0F8;
            color: #357CAB;
        }
        .tag-green {
            background: #E4F6F0;
            color: #2D8A6E;
        }
        .tag-orange {
            background: #FFF4E8;
            color: #C77830;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #C5D8E8;
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #A0BED5;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar {
                width: 60px;
                padding: 10px 4px;
            }
            .sidebar .menu-item span:not(.menu-icon) {
                display: none;
            }
            .sidebar .menu-section {
                display: none;
            }
            .sidebar .badge {
                display: none;
            }
            .sidebar .menu-item {
                justify-content: center;
                padding: 12px;
            }
            .course-grid {
                grid-template-columns: 1fr;
            }
            .content-area {
                padding: 16px 12px;
            }
            .top-nav .nav-links {
                display: none;
            }
            .modal {
                max-width: 95%;
                width: 95%;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== 顶部导航栏 ==================== -->
    <nav class="top-nav">
        <div class="logo-area">
            <div class="logo-icon">📘</div>
            <span class="logo-text">智慧课程建设平台</span>
        </div>
        <div class="nav-links">
            <span class="nav-link active" data-nav="home">🏠 首页</span>
            <span class="nav-link" data-nav="courses">📚 课程中心</span>
            <span class="nav-link" data-nav="resources">📦 资源库</span>
        </div>
        <div class="spacer"></div>
        <div class="user-info" title="教师账户">
            <div class="avatar">张</div>
            <span>张教授</span>
        </div>
    </nav>

    <!-- ==================== 主体布局 ==================== -->
    <div class="main-container">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="menu-section">课程管理</div>
            <div class="menu-item active" data-page="courses" id="menu-courses">
                <span class="menu-icon">📋</span> <span>我的课程</span>
                <span class="badge" id="course-count-badge">0</span>
            </div>
            <div class="menu-item" data-page="new-course" id="menu-new-course">
                <span class="menu-icon">➕</span> <span>新建课程</span>
            </div>
            <div class="divider"></div>
            <div class="menu-section">资源中心</div>
            <div class="menu-item" data-page="resources" id="menu-resources">
                <span class="menu-icon">📦</span> <span>资源库</span>
                <span class="badge" style="background:#E67E22;" id="res-count-badge">0</span>
            </div>

                { id: 'r011', name: '参考文献与拓展阅读书单', type: 'other', category: '参考文献',
                    desc: '推荐阅读的经典文献和最新研究成果列表', format: 'PDF', size: '1MB',
                    tags: ['预测理论及方法', '文献'], isPredictResource: true },
                { id: 'r012', name: '数据科学常用工具包', type: 'other', category: '其他资料',
                    desc: 'Python/R常用数据分析与可视化工具包汇总', format: 'ZIP', size: '80MB',
                    tags: ['数据科学', '工具'], isPredictResource: false },
            ];

            // 当前页面
            let currentPage = 'courses';
            // 编辑中的课程ID（null表示新建）
            let editingCourseId = null;

            // ==================== DOM引用 ====================
            const contentArea = document.getElementById('content-area');
            const modalContainer = document.getElementById('modal-container');
            const toastContainer = document.getElementById('toast-container');
            const courseCountBadge = document.getElementById('course-count-badge');
            const resCountBadge = document.getElementById('res-count-badge');

            // ==================== 初始化 ====================
            function init() {
                updateBadges();
                renderPage('courses');
                setupSidebarListeners();
                setupNavListeners();
            }

            function updateBadges() {
                const activeCourses = courses.filter(c => c.status === 'active').length;
                courseCountBadge.textContent = activeCourses;
                const predictResources = allResources.filter(r => r.isPredictResource).length;
                resCountBadge.textContent = predictResources;
            }

            // ==================== Toast ====================
            function showToast(message, type = 'info') {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                const icons = { info: 'ℹ️', success: '✅', error: '❌' };
                toast.innerHTML = `<span>${icons[type] || icons.info}</span> ${message}`;
                toastContainer.appendChild(toast);
                setTimeout(() => {
                    toast.style.animation = 'toastOut 0.3s ease forwards';
                    setTimeout(() => toast.remove(), 300);
                }, 2500);
            }

            // ==================== 模态框 ====================
            function openModal(htmlContent) {
                modalContainer.innerHTML = `
                    <div class="modal-overlay" id="modal-overlay">
                        ${htmlContent}
                    </div>`;
                const overlay = document.getElementById('modal-overlay');
                overlay.addEventListener('click', function(e) {
                    if (e.target === overlay) closeModal();
                });
                document.addEventListener('keydown', handleEscKey);
            }

            function closeModal() {
                const overlay = document.getElementById('modal-overlay');
                if (overlay) {
                    overlay.classList.add('closing');
                    setTimeout(() => {
                        modalContainer.innerHTML = '';
                    }, 180);
                }
                document.removeEventListener('keydown', handleEscKey);
            }

            function handleEscKey(e) {
                if (e.key === 'Escape') closeModal();
            }
            // 暴露到全局
            window.closeModal = closeModal;

            // ==================== 页面渲染 ====================
            function renderPage(page, extraData = null) {
                currentPage = page;
                switch (page) {
                    case 'courses':
                        renderCoursesPage();
                        break;
                    case 'new-course':
                        openNewCourseModal();
                        break;
                    case 'resources':
                        renderResourcesPage('all');
                        break;
                    case 'predict-resources':
                        renderResourcesPage('predict');
                        break;
                    case 'settings':
                        renderSettingsPage();
                        break;
                    default:
                        renderCoursesPage();
                }
                updateSidebarActive(page);
            }

            function updateSidebarActive(page) {
                document.querySelectorAll('.sidebar .menu-item').forEach(item => {
                    item.classList.remove('active');
                    if (item.dataset.page === page) item.classList.add('active');
                });
                document.querySelectorAll('.top-nav .nav-link').forEach(link => {
                    link.classList.remove('active');
                });
            }

            // ==================== 课程列表页 ====================
            function renderCoursesPage() {
                const activeCourses = courses.filter(c => c.status === 'active');
                const draftCourses = courses.filter(c => c.status === 'draft');
                let cardsHTML = '';
                const allDisplay = [...activeCourses, ...draftCourses];

                if (allDisplay.length === 0) {
                    cardsHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">📭</div>
                            <p>暂无课程，点击下方按钮创建您的第一门课程</p>
                            <button class="btn btn-primary" onclick="document.getElementById('menu-new-course').click()">
                                ➕ 新建课程
                            </button>
                        </div>`;
                } else {
                    cardsHTML = allDisplay.map(c => {
                        const resourceCount = c.resourceIds ? c.resourceIds.length : 0;
                        const statusTag = c.status === 'draft' ?
                            '<span class="tag tag-orange" style="margin-left:6px;">草稿</span>' :
                            '<span class="tag tag-green" style="margin-left:6px;">进行中</span>';
                        return `
                        <div class="course-card" data-course-id="${c.id}">
                            <div class="card-accent"></div>
                            <div class="card-header">
                                <span class="course-name">${escapeHTML(c.name)}${statusTag}</span>
                            </div>
                            <div class="course-meta">
                                <span>👨‍🏫 ${escapeHTML(c.teacher)}</span>
                                <span>📅 ${escapeHTML(c.semester)}</span>
                                <span>🎓 ${escapeHTML(c.credits)} 学分</span>
                            </div>
                            <p style="font-size:12px;color:var(--text-light);line-height:1.5;margin:4px 0;">
                                ${escapeHTML(c.description || '暂无描述')}
                            </p>
                            <div class="resource-count">
                                📎 关联资源：<strong>${resourceCount}</strong> 个
                            </div>
                            <div class="card-actions">
                                <button class="btn btn-outline btn-sm" onclick="event.stopPropagation();window._editCourse('${c.id}')">
                                    ✏️ 编辑
                                </button>
                                <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();window._viewCourseDetail('${c.id}')">
                                    👁️ 详情
                                </button>
                                <button class="btn btn-danger btn-xs" onclick="event.stopPropagation();window._deleteCourse('${c.id}')">
                                    🗑️ 删除
                                </button>
                            </div>
                        </div>`;
                    }).join('');

                    <div class="page-header">

                            <div class="page-title">📋 我的课程</div>
                            <div class="page-subtitle">管理您创建的所有课程，共 <strong>${courses.length}</strong> 门</div>
                        </div>
                        <div class="search-bar">
                            <input type="text" class="search-input" placeholder="🔍 搜索课程..." id="course-search-input">

                                ➕ 新建课程
                            </button>
                        </div>
                    </div>
                    <div class="course-grid" id="course-grid">
                        ${cardsHTML}
                    </div>
                `;

                const searchInput = document.getElementById('course-search-input');
                if (searchInput) {
                    searchInput.addEventListener('input', function() {
                        const keyword = this.value.toLowerCase().trim();
                        const grid = document.getElementById('course-grid');
                        if (!grid) return;
                        const cards = grid.querySelectorAll('.course-card');
                        cards.forEach(card => {
                            const text = card.textContent.toLowerCase();
                            card.style.display = text.includes(keyword) ? '' : 'none';

            // ==================== 资源库页面 ====================
            function renderResourcesPage(filter = 'all') {
                let resourcesToShow = filter === 'predict' ?
                    allResources.filter(r => r.isPredictResource) :
                    allResources;
                const pageTitle = filter === 'predict' ?

                    '📦 全部资源库';
                const pageSubtitle = filter === 'predict' ?

                    '平台所有可用教学资源，支持教师自由选用';

                const typeBadgeClass = {
                    'ppt': 'badge-ppt',
                    'doc': 'badge-doc',

                const rowsHTML = resourcesToShow.map(r => `

                    </div>`}

                // 资源搜索
                const resSearchInput = document.getElementById('res-search-input');

                        return `

                                <input type="text" id="input-semester" value="${escapeHTML(semester)}" placeholder="例如：2025-2026学年第一学期">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>📝 课程描述</label>
                            <textarea id="input-description" rows="3" placeholder="请输入课程描述信息...">${escapeHTML(description)}</textarea>

                        <div class="form-group">

                            <div class="picker-header">
                                <span class="icon-highlight">🔮</span> 从资源库选择关联资源（可多选）

                            </div>
                            <p style="font-size:11px;color:var(--text-light);margin-top:4px;">
                                💡 提示：课程名称、授课教师、学期等信息均可<strong>灵活填写修改</strong>，所有字段支持随时编辑。
                            </p>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-ghost" onclick="window.closeModal()">取消</button>
                        <button class="btn btn-primary" id="btn-save-course">
                            ${isEdit ? '💾 保存修改' : '✅ 创建课程'}
                        </button>
                    </div>
                </div>`;

                openModal(modalHTML);

                // 绑定保存按钮
                setTimeout(() => {
                    const saveBtn = document.getElementById('btn-save-course');
                    if (saveBtn) {
                        saveBtn.addEventListener('click', function() {
                            saveCourse(isEdit, prefillData);
                        });
                    }
                }, 100);
            }

            function saveCourse(isEdit, prefillData) {
                const name = document.getElementById('input-course-name')?.value.trim();
                const teacher = document.getElementById('input-teacher')?.value.trim();
                const semester = document.getElementById('input-semester')?.value.trim();
                const credits = document.getElementById('input-credits')?.value.trim();
                const description = document.getElementById('input-description')?.value.trim();
                const status = document.getElementById('input-status')?.value || 'active';

                if (!name) {
                    showToast('请填写课程名称', 'error');
                    return;
                }
                if (!teacher) {
                    showToast('请填写授课教师', 'error');
                    return;
                }

                // 收集选中的资源ID
                const checkedBoxes = document.querySelectorAll('#resource-picker-container input[type="checkbox"]:checked');
                const selectedResourceIds = Array.from(checkedBoxes).map(cb => cb.value);

                if (isEdit && prefillData) {
                    // 更新现有课程
                    const idx = courses.findIndex(c => c.id === prefillData.id);
                    if (idx >= 0) {
                        courses[idx].name = name;
                        courses[idx].teacher = teacher;
                        courses[idx].semester = semester;
                        courses[idx].credits = credits;
                        courses[idx].description = description;
                        courses[idx].resourceIds = selectedResourceIds;
                        courses[idx].status = status;
                    }
                    showToast('课程修改成功！信息已更新', 'success');
                } else {
                    // 创建新课程
                    const newCourse = {
                        id: 'c' + Date.now().toString(36).toUpperCase(),
                        name,
                        teacher,
                        semester,
                        credits,
                        description,
                        resourceIds: selectedResourceIds,
                        createdAt: new Date().toISOString().split('T')[0],
                        status
                    };
                    courses.unshift(newCourse);
                    showToast(`课程"${name}"创建成功！已关联 ${selectedResourceIds.length} 个资源`, 'success');
                }

                closeModal();
                updateBadges();
                renderPage('courses');
                editingCourseId = null;
            }

            // ==================== 全局函数暴露 ====================
            window._editCourse = function(courseId) {
                const course = courses.find(c => c.id === courseId);
                if (course) {
                    openNewCourseModal(course);
                }
            };

            window._viewCourseDetail = function(courseId) {
                const course = courses.find(c => c.id === courseId);
                if (!course) return;
                const linkedResources = allResources.filter(r => course.resourceIds && course.resourceIds.includes(r
                    .id));
                const resListHTML = linkedResources.length > 0 ?
                    linkedResources.map(r =>
                        `<li style="margin:4px 0;font-size:13px;">📎 ${escapeHTML(r.name)} <span style="font-size:10px;color:var(--text-light);">(${r.format}, ${r.size})</span></li>`
                        ).join('') :
                    '<li style="color:var(--text-light);">暂无关联资源</li>';

                const detailHTML = `
                <div class="modal">
                    <div class="modal-header">
                        <h3>📋 课程详情</h3>
                        <button class="modal-close" onclick="window.closeModal()">✕</button>
                    </div>
                    <div class="modal-body">
                        <p><strong>课程名称：</strong>${escapeHTML(course.name)}</p>
                        <p><strong>授课教师：</strong>${escapeHTML(course.teacher)}</p>
                        <p><strong>学期：</strong>${escapeHTML(course.semester)}</p>
                        <p><strong>学分：</strong>${escapeHTML(course.credits)}</p>
                        <p><strong>状态：</strong>${course.status==='active'?'进行中':'草稿'}</p>
                        <p><strong>描述：</strong>${escapeHTML(course.description || '暂无')}</p>
                        <p><strong>创建日期：</strong>${escapeHTML(course.createdAt)}</p>
                        <hr style="margin:12px 0;border-color:var(--border-light);">
                        <p><strong>📎 关联资源（${linkedResources.length}个）：</strong></p>
                        <ul>${resListHTML}</ul>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-outline btn-sm" onclick="window.closeModal();window._editCourse('${course.id}')">✏️ 编辑此课程</button>
                        <button class="btn btn-ghost btn-sm" onclick="window.closeModal()">关闭</button>
                    </div>
                </div>`;
                openModal(detailHTML);
            };

            window._deleteCourse = function(courseId) {
                const course = courses.find(c => c.id === courseId);
                if (!course) return;
                const confirmHTML = `
                <div class="modal">
                    <div class="modal-header">
                        <h3>⚠️ 确认删除</h3>
                        <button class="modal-close" onclick="window.closeModal()">✕</button>
                    </div>
                    <div class="modal-body">
                        <p>确定要删除课程 <strong>"${escapeHTML(course.name)}"</strong> 吗？</p>
                        <p style="color:#e05555;font-size:13px;">此操作不可恢复，关联的资源引用将被移除。</p>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-ghost" onclick="window.closeModal()">取消</button>
                        <button class="btn btn-danger" id="btn-confirm-delete">确认删除</button>
                    </div>
                </div>`;
                openModal(confirmHTML);
                setTimeout(() => {
                    const confirmBtn = document.getElementById('btn-confirm-delete');
                    if (confirmBtn) {
                        confirmBtn.addEventListener('click', function() {
                            courses = courses.filter(c => c.id !== courseId);
                            closeModal();
                            updateBadges();
                            renderPage('courses');
                            showToast(`课程"${course.name}"已删除`, 'success');
                        });
                    }
                }, 100);
            };

            window._addResourceToCoursePrompt = function(resourceId) {
                const resource = allResources.find(r => r.id === resourceId);
                if (!resource) return;
                const activeCourses = courses.filter(c => c.status === 'active');
                if (activeCourses.length === 0) {
                    showToast('暂无进行中的课程，请先创建课程', 'error');
                    return;
                }
                const optionsHTML = activeCourses.map(c => `
                    <option value="${c.id}">${escapeHTML(c.name)} — ${escapeHTML(c.teacher)}</option>
                `).join('');
                const promptHTML = `
                <div class="modal">
                    <div class="modal-header">
                        <h3>📎 选用资源到课程</h3>
                        <button class="modal-close" onclick="window.closeModal()">✕</button>
                    </div>
                    <div class="modal-body">
                        <p>将资源 <strong>"${escapeHTML(resource.name)}"</strong> 添加到：</p>
                        <div class="form-group">
                            <label>选择目标课程</label>
                            <select id="select-target-course">
                                ${optionsHTML}
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-ghost" onclick="window.closeModal()">取消</button>
                        <button class="btn btn-primary" id="btn-add-resource">确认添加</button>
                    </div>
                </div>`;
                openModal(promptHTML);
                setTimeout(() => {
                    const addBtn = document.getElementById('btn-add-resource');
                    if (addBtn) {
                        addBtn.addEventListener('click', function() {
                            const targetId = document.getElementById('select-target-course')?.value;
                            if (targetId) {
                                const course = courses.find(c => c.id === targetId);
                                if (course) {
                                    if (!course.resourceIds) course.resourceIds = [];
                                    if (!course.resourceIds.includes(resourceId)) {
                                        course.resourceIds.push(resourceId);
                                        showToast(`资源已添加到课程"${course.name}"`, 'success');
                                    } else {
                                        showToast('该资源已在此课程中', 'info');
                                    }
                                    closeModal();
                                    updateBadges();
                                    if (currentPage === 'courses') renderCoursesPage();
                                }
                            }
                        });
                    }
                }, 100);
            };

            // ==================== 侧边栏监听 ====================
            function setupSidebarListeners() {
                document.querySelectorAll('.sidebar .menu-item').forEach(item => {
                    item.addEventListener('click', function() {
                        const page = this.dataset.page;
                        if (page) {
                            if (page === 'new-course') {
                                openNewCourseModal();
                                updateSidebarActive('new-course');
                            } else {
                                renderPage(page);
                            }
                        }
                    });
                });
            }

            function setupNavListeners() {
                document.querySelectorAll('.top-nav .nav-link').forEach(link => {
                    link.addEventListener('click', function() {
                        const nav = this.dataset.nav;
                        document.querySelectorAll('.top-nav .nav-link').forEach(l => l
                            .classList.remove('active'));
                        this.classList.add('active');
                        if (nav === 'home' || nav === 'courses') {
                            renderPage('courses');
                        } else if (nav === 'resources') {
                            renderPage('resources');
                        }
                    });
                });
            }

            // ==================== 工具函数 ====================
            function escapeHTML(str) {
                if (!str) return '';
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ==================== 启动 ====================
            init();
            console.log('✅ 智慧课程建设平台（天蓝版）已就绪');
            console.log('📋 功能：课程管理 | 灵活新建/编辑课程 | 资源库浏览');
            console.log('🔮 《预测理论及方法》专属资源已预置，教师可在新建课程时选用');
            console.log('💡 所有课程字段（名称、教师、学期等）均可灵活填写修改');
        })();
    </script>
</body>
</html>
